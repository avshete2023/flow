spring:
  application:
    name: flow-api
  datasource:
    url: ${FLOW_DB_URL:jdbc:postgresql://localhost:5432/flow}
    username: ${FLOW_DB_USERNAME:flow}
    password: ${FLOW_DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${FLOW_RABBITMQ_HOST:localhost}
    port: ${FLOW_RABBITMQ_PORT:5672}
    username: ${FLOW_RABBITMQ_USERNAME:flow}
    password: ${FLOW_RABBITMQ_PASSWORD:}
  data:
    redis:
      host: ${FLOW_REDIS_HOST:localhost}
      port: ${FLOW_REDIS_PORT:6379}
      password: ${FLOW_REDIS_PASSWORD:}

flow:
  security:
    jwt:
      issuer: ${FLOW_JWT_ISSUER:flow-api}
      access-token-ttl: ${FLOW_JWT_ACCESS_TOKEN_TTL:PT60M}
      secret: ${FLOW_JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
